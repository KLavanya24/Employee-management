<!DOCTYPE html>
<html>
<head>
  <title>Employee Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

  <button onclick="toggleDarkMode()">🌙 Dark Mode</button>

  <h2>Employee Dashboard</h2>

  <h3>Total Employees: <span id="count">0</span></h3>
  <h3>Total Salary: ₹<span id="totalSalary">0</span></h3>

  <!-- Inputs -->
  <input type="text" id="empId" placeholder="Employee ID">
  <input type="text" id="name" placeholder="Name">
  <input type="text" id="deptId" placeholder="Department ID">
  <input type="number" id="salary" placeholder="Salary">
  <input type="date" id="hireDate">

  <button onclick="saveEmployee()">Save</button>

  <br><br>

  <!-- Search -->
  <input type="text" id="search" placeholder="Search Name" onkeyup="display()">

  <!-- Table -->
  <table border="1">
    <thead>
      <tr>
        <th>ID</th>
        <th>Name</th>
        <th>Dept</th>
        <th>Salary</th>
        <th>Hire Date</th>
        <th>Action</th>
      </tr>
    </thead>
    <tbody id="tableBody"></tbody>
  </table>

  <br>

  <!-- Chart -->
  <canvas id="chart"></canvas>

</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="script.js"></script>

</body>
</html>
