<!DOCTYPE html>
<html>
<head>
    <title>Employee Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
<div class="main">

    <h1>Employee Dashboard</h1>

    <!-- DARK MODE -->
    <button id="darkBtn" onclick="toggleDarkMode()">🌙 Dark Mode</button>

    <!-- CARDS -->
    <div class="cards">
        <div class="card">Total Employees: <span id="count">0</span></div>
        <div class="card">Total Salary: ₹<span id="totalSalary">0</span></div>
    </div>

    <!-- INPUTS -->
    <input type="text" id="name" placeholder="Name">
    <input type="number" id="salary" placeholder="Salary">
    <button onclick="saveEmployee()">Save</button>

    <!-- SEARCH -->
    <input type="text" id="search" placeholder="Search Name" onkeyup="searchEmployee()">

    <!-- TABLE -->
    <table>
        <thead>
            <tr>
                <th>Name</th>
                <th>Salary</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody id="tableBody"></tbody>
    </table>

</div>

<script src="script.js"></script>
</body>
</html>
