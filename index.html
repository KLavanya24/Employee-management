<!DOCTYPE html>
<html>
<head>
  <title>Login</title>
  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background: #0f172a;
      font-family: Arial;
    }
    .box {
      background: white;
      padding: 30px;
      border-radius: 10px;
    }
    input {
      display: block;
      margin: 10px 0;
      padding: 10px;
      width: 200px;
    }
    button {
      padding: 10px;
      width: 100%;
      background: #3b82f6;
      color: white;
      border: none;
    }
  </style>
</head>
<body>

<div class="box">
  <h2>Login</h2>
  <input type="text" id="user" placeholder="Username">
  <input type="password" id="pass" placeholder="Password">
  <button onclick="login()">Login</button>
</div>

<script>
function login() {
  if (user.value === "admin" && pass.value === "1234") {
    localStorage.setItem("login", "true");
    location.href = "index.html";
  } else {
    alert("Wrong login");
  }
}
</script>

</body>
</html>
